{% extends "layout.html" %}
{% block title %}Edit Listing{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h1 class="mb-2">Edit Listing</h1>
            <p class="text-muted mb-0">
                Update your property details below.
            </p>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="/ssr/realty/{{ realty.id }}/edit">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title" value="{{ realty.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Price</label>
                        <input type="number" class="form-control form-control-lg" id="price" name="price" value="{{ realty.price }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="city" class="form-label">City</label>
                        <input type="text" class="form-control form-control-lg" id="city" name="city" value="{{ realty.city }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control form-control-lg" id="address" name="address" value="{{ realty.address }}" required>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label">Image URL</label>
                        <input type="text" class="form-control form-control-lg" id="image" name="image" value="{{ realty.image }} " required>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3">
                        <button type="submit" class="btn btn-dark btn-lg px-4">
                            Save Changes
                        </button>
                        <a href="/ssr/profile" class="btn btn-outline-secondary btn-lg px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

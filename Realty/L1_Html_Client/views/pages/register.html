{% extends "layout.html" %}
{% block title %}Register{% endblock %}

{% block content %}
    <h1 class="mb-4">Register</h1>
    <form method="post" action="/api/user/register">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <fieldset class="mb-3">
            <legend class="form-label mb-2">Account Type</legend>

            <div class="form-check">
                <input class="form-check-input" type="radio" id="role_buyer" name="role" value="buyer" required checked>
                <label class="form-check-label" for="role_buyer">
                    Buyer
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" id="role_realtor" name="role" value="realtor">
                <label class="form-check-label" for="role_realtor">
                    Realtor
                </label>
            </div>
        </fieldset>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
{% endblock %}

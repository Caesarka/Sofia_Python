{% extends "layout.html" %}
{% block title %}Create Listing{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h1 class="mb-2">Create New Listing</h1>
            <p class="text-muted mb-0">
                Add the main property details below and publish it later from your profile.
            </p>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <form method="POST" action="/ssr/realty/create">
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control form-control-lg" id="title" name="title" required placeholder="Modern apartment with river view">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" class="form-control form-control-lg" id="price" name="price" required placeholder="250000">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="city" class="form-label">City</label>
                            <input type="text" class="form-control form-control-lg" id="city" name="city" required placeholder="New York">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control form-control-lg" id="address" name="address" required placeholder="15 Park Avenue">
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label">Image URL</label>
                        <input type="url" class="form-control form-control-lg" id="image" name="image" placeholder="https://example.com/property.jpg">
                        <div class="form-text">Optional. If left empty, the default property image will be used.</div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3">
                        <button type="submit" class="btn btn-dark btn-lg px-4">
                            Create Listing
                        </button>
                        <a href="/ssr/profile" class="btn btn-outline-secondary btn-lg px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

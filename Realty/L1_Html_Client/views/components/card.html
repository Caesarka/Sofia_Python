<div class="col-md-4 col-lg-3">
    <div class="card h-100 shadow-sm">
        <img class="card-img-top" src="{{ realty.image or '/assets/default.jpg' }}" alt="Card image cap">
        <div class="card-body">
            <h5 class="card-title">{{ realty.title }}</h5>
            <p class="text-muted">{{ realty.address }}</p>
            <p class="text-muted">{{ realty.city }}</p>
            <p class="text-muted">{{ realty.price }}</p>
            {% if request.user and (request.user.role == "admin" or (request.user.role == "realtor" and request.user.user_id == realty.user_id)) %}
            <div class="d-flex gap-2 mt-3">
                <a href="/ssr/realty/{{ realty.id }}/edit" class="btn btn-dark">
                    Edit
                </a>
                <form action="/ssr/realty/{{ realty.id }}/delete" method="post" class="m-0" onclick="return confirm('Delete this listing?')">
                    <button type="submit" class="btn btn-outline-dark">
                        Delete
                    </button>
                </form>
            </div>
            {% endif %}
        </div>
    </div>
</div>

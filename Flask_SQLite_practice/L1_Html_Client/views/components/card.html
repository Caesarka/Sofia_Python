<div class="col-md-4 col-lg-3">
    <div class="card h-100 shadow-sm">
        <img class="card-img-top" src="{{ realty.image or '/assets/default.jpg' }}" alt="Card image cap">
        <div class="card-body">
            <h5 class="card-title">{{ realty.title }}</h5>
            <p class="text-muted">{{ realty.address }}</p>
            <p class="text-muted">{{ realty.city }}</p>
            <p class="text-muted">{{ realty.price }}</p>
        </div>
    </div>
</div>
